name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual triggering from the GitHub UI

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Go toolchain + server build ───────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Build server binary
        run: CGO_ENABLED=0 go build -o server ./cmd/server/

      # ── Node / Playwright ─────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium browser + system deps
        run: npx playwright install chromium --with-deps

      # ── Start server ──────────────────────────────────────────────────────
      - name: Start server with e2e test data
        run: ./server --init-with-test-data e2e/testdata/emails &

      - name: Wait for server to be healthy
        run: |
          echo "Waiting for server at http://localhost:8025 ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8025/ > /dev/null; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: server did not become ready within 30 s"
          exit 1

      # ── Run tests ─────────────────────────────────────────────────────────
      - name: Run Playwright tests
        id: playwright
        run: npx playwright test

      # ── Report to GitHub ──────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = 'test-results/results.json';
          if (!fs.existsSync(path)) {
            console.log('No results JSON found — skipping summary');
            process.exit(0);
          }
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));

          let total = 0, passed = 0, failed = 0, skipped = 0, flaky = 0;
          (data.suites || []).forEach(function walk(suite) {
            (suite.specs || []).forEach(spec => {
              spec.tests.forEach(t => {
                total++;
                if (t.status === 'skipped') skipped++;
                else if (t.results.some(r => r.status === 'failed')) failed++;
                else if (t.results.some(r => r.status === 'flaky'))  flaky++;
                else passed++;
              });
            });
            (suite.suites || []).forEach(walk);
          });

          const icon = failed > 0 ? '❌' : '✅';
          const lines = [
            `## ${icon} Playwright E2E Results`,
            '',
            '| Result | Count |',
            '|--------|------:|',
            `| ✅ Passed  | ${passed}  |`,
            `| ❌ Failed  | ${failed}  |`,
            `| 🔄 Flaky   | ${flaky}   |`,
            `| ⏭️ Skipped | ${skipped} |`,
            `| 📊 Total   | ${total}   |`,
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');
          EOF

      # ── Upload artefacts (always — even on failure) ───────────────────────
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-json
          path: test-results/results.json
          retention-days: 30
